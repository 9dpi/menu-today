<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #ff4757;
      --secondary-color: #2f3542;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    body { 
      background: var(--bg-gradient); 
      font-family: 'Outfit', sans-serif; 
      min-height: 100vh;
      color: var(--secondary-color);
    }
    .container { max-width: 800px; }
    .card-menu { 
      border: none;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
      margin-bottom: 25px; 
      transition: transform 0.3s ease;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }
    .card-menu:hover { transform: translateY(-5px); }
    .header-section {
      padding: 40px 0;
      text-align: center;
    }
    .header-section h2 {
      font-weight: 600;
      color: var(--primary-color);
      letter-spacing: 1px;
    }
    .copy-btn { 
      cursor: pointer; 
      transition: all 0.2s; 
      border-radius: 10px;
    }
    .copy-btn:hover { background-color: var(--primary-color) !important; color: white !important; }
    .badge-status { 
      padding: 8px 15px;
      border-radius: 30px;
      font-weight: 400;
    }
    .type-icon { font-size: 1.5rem; margin-right: 10px; }
    #loading {
      font-style: italic;
      color: #747d8c;
    }
    .label-small {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      color: #a4b0be;
      margin-bottom: 5px;
      display: block;
    }
    textarea.form-control {
      background: #f1f2f6;
      border: 1px solid #ced4da;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="header-section">
      <h2>🍱 Menu Today Manager</h2>
      <p class="text-muted">Hệ thống quản lý thực đơn tự động cho TikTok</p>
    </div>

    <div id="loading" class="text-center my-5">
      <div class="spinner-border text-danger mb-2" role="status"></div>
      <div>Đang lấy thực đơn hôm nay...</div>
    </div>

    <div id="content"></div>
  </div>

  <script>
    window.onload = function() {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(renderMenu).getTodayMenu();
      } else {
        const container = document.getElementById('content');
        document.getElementById('loading').style.display = 'none';
        container.innerHTML = `
          <div class="alert alert-warning text-center p-4 shadow-sm" style="border-radius: 20px;">
            <p class="mb-0">
              <strong>⚠️ Chế độ xem trước (Static Preview)</strong><br>
              Trang web này đang chạy ở chế độ tĩnh. Để xem dữ liệu thật từ Google Sheets, bạn hãy truy cập đường link Web App chính thức từ Google Apps Script.
            </p>
          </div>`;
      }
    };

    function renderMenu(menus) {
      const container = document.getElementById('content');
      const loader = document.getElementById('loading');
      if(loader) loader.style.display = 'none';
      
      if (!menus || menus.length === 0) {
        container.innerHTML = `
          <div class="alert alert-light text-center p-5 shadow-sm" style="border-radius: 20px;">
            <p class="mb-0">Chưa có dữ liệu cho hôm nay. <br><strong>Hãy chạy script generateDailyContent trong Apps Script!</strong></p>
          </div>`;
        return;
      }

      container.innerHTML = '';
      menus.forEach((item, index) => {
        const isLunch = item.type === 'Lunch' || item.type === 'Trưa';
        const card = `
          <div class="card card-menu p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h4 class="mb-0">
                <span class="type-icon">${isLunch ? '☀️' : '🌙'}</span>
                ${isLunch ? 'Bữa Trưa' : 'Bữa Tối'}
              </h4>
              <span class="badge ${item.status === 'Pending' ? 'bg-warning text-dark' : 'bg-success'} badge-status">
                ${item.status}
              </span>
            </div>
            
            <div class="mb-4">
              <span class="label-small">Mâm cơm gia đình đề xuất</span>
              <div class="p-3 bg-light rounded-3 border" style="font-size: 1.2rem; border-left: 5px solid var(--primary-color) !important;">
                <strong>${item.menu}</strong>
                <div class="mt-2 d-flex gap-3" style="font-size: 0.9rem; color: #57606f;">
                  <span>💰 ${item.price}</span>
                  <span>⏱️ ${item.time}</span>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <span class="label-small">Cách nấu tóm tắt</span>
              <div class="p-3 bg-white border rounded-3" style="font-size: 0.95rem; line-height: 1.6; background-color: #fffaf0 !important;">
                ${item.instructions.replace(/\n/g, '<br>')}
              </div>
            </div>
            
            <div class="mb-4">
              <label class="label-small">Prompt tạo Video/Ảnh (AI)</label>
              <div class="input-group">
                <input type="text" class="form-control" value="${item.prompt}" readonly id="p-${index}">
                <button class="btn btn-outline-danger copy-btn" onclick="copyText('p-${index}')">Copy Prompt</button>
              </div>
            </div>

            <div class="mb-1">
              <label class="label-small">TikTok Title & Description</label>
              <textarea class="form-control mb-3" rows="4" readonly id="t-${index}">${item.title}\n\n${item.desc}\n\n${item.tags}</textarea>
              <button class="btn btn-dark w-100 py-2 shadow-sm" onclick="copyText('t-${index}')" style="border-radius: 12px;">
                Copy Toàn bộ Cap & Hashtag
              </button>
            </div>
          </div>
        `;
        container.innerHTML += card;
      });
    }

    function copyText(id) {
      const copyText = document.getElementById(id);
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyText.value).then(() => {
        // Visual feedback
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✓ Đã copy!";
        btn.classList.replace('btn-dark', 'btn-success');
        btn.classList.replace('btn-outline-danger', 'btn-success');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.replace('btn-success', 'btn-dark');
          btn.classList.replace('btn-success', 'btn-outline-danger');
        }, 2000);
      });
    }
  </script>
</body>
</html>
